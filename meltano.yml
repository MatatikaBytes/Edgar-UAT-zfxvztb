default_environment: dev
project_id: 019ee194-e2df-7e33-9bca-43624ccd5fcb
environments:
- name: dev
- name: staging
- name: prod
plugins:
  extractors:
  - name: tap-meltano-cloud
    variant: meltanolabs
    pip_url: git+https://github.com/MeltanoLabs/tap-meltano-cloud.git@v0.1.6
  - name: tap-mysql
    variant: matatika
    pip_url: git+https://github.com/Matatika/pipelinewise-tap-mysql.git@v1.1.0
  loaders:
  - name: target-postgres
    variant: matatika
    pip_url: git+https://github.com/Matatika/pipelinewise-target-postgres.git@v0.2.1
  transformers:
  - name: dbt
    variant: dbt-labs
    pip_url: dbt-core~=1.7.0 dbt-postgres~=1.7.0 dbt-snowflake~=1.7.0 dbt-bigquery~=1.7.0 dbt-sqlserver~=1.7.0 certifi==2025.1.31
  files:
  - name: files-dbt
    variant: matatika
    pip_url: git+https://github.com/Matatika/files-dbt@v1.3
    lock: true
  utilities:
  - name: matatika
    variant: matatika
    pip_url: matatika~=1.17.1
    lock: true
  - name: dbt-artifacts
    variant: matatika
    pip_url: git+https://github.com/Matatika/dbt-artifacts-ext.git@v0.1.0
    lock: true
